<!DOCTYPE html>
<html lang=“en”>
<head>
<meta charset=“UTF-8”>
<meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
<title>Dolphin BDM - Professional MDF Board Manufacturer & Exporter</title>
<meta name=“description” content=“Dolphin Building Decoration Materials (Liaocheng) Co., Ltd. - Professional exporter of Melamine Faced MDF, Wood Veneer Faced MDF. CE, CARB, SGS certified. Global shipping.”>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{–p:#1a3a2a;–pl:#2d5a42;–a:#c49a3c;–al:#e8c06a;–bg:#f8f7f3;–w:#fff;–t:#1a1a1a;–tl:#666;–b:#e0ddd6}
body{font-family:Inter,sans-serif;background:var(–bg);color:var(–t);line-height:1.6;overflow-x:hidden}
.lang-bar{position:fixed;top:16px;right:16px;z-index:1000;display:flex;gap:4px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:6px;border-radius:50px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.lang-btn{width:36px;height:36px;border-radius:50%;border:2px solid transparent;background:0;font-size:11px;font-weight:700;cursor:pointer;transition:all .3s;color:var(–t)}
.lang-btn.active{background:var(–p);color:#fff;border-color:var(–a)}
.lang-btn:hover{background:var(–pl);color:#fff}
nav{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(–b)}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 40px;height:72px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:44px;height:44px;background:var(–p);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-family:Georgia,serif;font-size:20px;font-weight:700;color:var(–p)}
.logo-sub{font-size:9px;color:var(–a);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{text-decoration:none;color:var(–t);font-size:14px;font-weight:500;transition:color .3s}
.nav-links a:hover{color:var(–p)}
.nav-cta{background:var(–p);color:#fff!important;padding:10px 24px;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;transition:all .3s}
.nav-cta:hover{background:var(–pl);transform:translateY(-1px)}
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;background:var(–p)}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,58,42,.98) 0%,rgba(26,58,42,.88) 50%,rgba(44,80,60,.92) 100%)}
.hero-pattern{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.4) 40px,rgba(255,255,255,.4) 80px)}
.hero-content{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:100px 40px 80px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;width:100%}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(196,154,60,.15);border:1px solid rgba(196,154,60,.3);color:var(–al);padding:8px 16px;border-radius:50px;font-size:13px;font-weight:500;margin-bottom:24px}
.dot{width:6px;height:6px;background:var(–a);border-radius:50%;animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:Georgia,serif;font-size:62px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:20px}
.ac{color:var(–a)}
.hero-desc{font-size:18px;color:rgba(255,255,255,.72);line-height:1.8;margin-bottom:40px;max-width:520px}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap}
.btn-p{background:var(–a);color:var(–p);padding:14px 32px;border-radius:8px;font-weight:700;font-size:15px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s;border:none;cursor:pointer}
.btn-p:hover{background:var(–al);transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,154,60,.3)}
.btn-s{background:0;color:#fff;padding:14px 32px;border-radius:8px;font-weight:500;font-size:15px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;border:1.5px solid rgba(255,255,255,.3);transition:all .3s}
.btn-s:hover{border-color:#fff;background:rgba(255,255,255,.08)}
.hero-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.hero-stat{text-align:center;padding:20px 12px;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(255,255,255,.08)}
.hero-stat-n{font-family:Georgia,serif;font-size:38px;font-weight:700;color:var(–a);line-height:1}
.hero-stat-l{font-size:12px;color:rgba(255,255,255,.55);margin-top:8px}
.cert-row{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}
.cert-badge{background:rgba(196,154,60,.12);border:1px solid rgba(196,154,60,.2);color:var(–al);padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700}
.section{padding:100px 40px;max-width:1400px;margin:0 auto}
.section-label{font-size:12px;font-weight:700;color:var(–a);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.section-title{font-family:Georgia,serif;font-size:44px;font-weight:700;color:var(–p);line-height:1.15;margin-bottom:16px}
.section-desc{font-size:17px;color:var(–tl);max-width:600px;line-height:1.8;margin-bottom:60px}
.products{background:#fff}
.products-g{display:grid;grid-template-columns:1fr 1fr;gap:36px}
.product-card{background:var(–bg);border-radius:20px;overflow:hidden;border:1px solid var(–b);transition:all .4s}
.product-card:hover{transform:translateY(-8px);box-shadow:0 16px 48px rgba(0,0,0,.12);border-color:var(–a)}
.product-img{height:280px;background:linear-gradient(135deg,var(–p) 0%,var(–pl) 100%);position:relative;overflow:hidden}
.product-img-ol{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 24px,rgba(255,255,255,.06) 24px,rgba(255,255,255,.06) 25px),repeating-linear-gradient(90deg,transparent,transparent 24px,rgba(255,255,255,.06) 24px,rgba(255,255,255,.06) 25px)}
.product-img-ic{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;opacity:.25}
.product-tag{position:absolute;top:16px;left:16px;background:var(–a);color:var(–p);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700}
.product-body{padding:32px}
.product-name{font-family:Georgia,serif;font-size:24px;font-weight:700;color:var(–p);margin-bottom:6px}
.product-name-en{font-size:12px;color:var(–a);font-weight:600;margin-bottom:16px}
.product-desc{font-size:15px;color:var(–tl);line-height:1.7;margin-bottom:20px}
.product-specs{display:flex;flex-wrap:wrap;gap:8px}
.spec-tag{background:#fff;border:1px solid var(–b);color:var(–tl);padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500}
.features-g{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.feature-card{background:#fff;border:1px solid var(–b);border-radius:16px;padding:32px 24px;text-align:center;transition:all .3s}
.feature-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.08);border-color:var(–a)}
.feature-icon{width:60px;height:60px;background:linear-gradient(135deg,var(–pl),var(–p));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
.feature-title{font-size:16px;font-weight:700;color:var(–p);margin-bottom:8px}
.feature-text{font-size:14px;color:var(–tl);line-height:1.6}
.about{background:#fff}
.about-g{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-img{height:480px;background:linear-gradient(135deg,var(–p) 0%,var(–pl) 60%,#3d7a5a 100%);border-radius:20px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.about-img-ol{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(255,255,255,.04) 30px,rgba(255,255,255,.04) 31px)}
.about-img-ic{font-size:80px;margin-bottom:16px}
.about-img-t{color:rgba(255,255,255,.4);font-size:14px;text-align:center;line-height:1.6}
.about-text h3{font-family:Georgia,serif;font-size:30px;color:var(–p);margin-bottom:20px}
.about-text p{font-size:15px;color:var(–tl);line-height:1.9;margin-bottom:20px}
.about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:36px}
.about-stat{text-align:center;padding:20px;background:var(–bg);border-radius:12px;border:1px solid var(–b)}
.about-stat-n{font-family:Georgia,serif;font-size:32px;font-weight:700;color:var(–p)}
.about-stat-l{font-size:12px;color:var(–tl);margin-top:4px}
.certs{background:var(–p);padding:80px 40px}
.certs-inner{max-width:1400px;margin:0 auto}
.certs-header{text-align:center;margin-bottom:60px}
.certs-header .section-label{color:var(–a)}
.certs-header .section-title{color:#fff}
.certs-header .section-desc{color:rgba(255,255,255,.55);margin:0 auto}
.certs-g{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.cert-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:32px 20px;text-align:center;transition:all .3s}
.cert-card:hover{background:rgba(255,255,255,.1);border-color:var(–a)}
.cert-icon{font-size:36px;margin-bottom:14px}
.cert-name{color:#fff;font-size:15px;font-weight:700;margin-bottom:4px}
.cert-sub{color:rgba(255,255,255,.45);font-size:11px}
.contact{background:var(–bg)}
.contact-g{display:grid;grid-template-columns:1fr 1fr;gap:60px}
.contact-info{display:flex;flex-direction:column;gap:24px}
.contact-item{display:flex;gap:16px;align-items:flex-start}
.contact-icon{width:46px;height:46px;background:var(–p);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.contact-label{font-size:12px;color:var(–tl);margin-bottom:2px}
.contact-value{font-size:15px;font-weight:600;color:var(–t)}
.contact-form{display:flex;flex-direction:column;gap:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:13px;font-weight:600;color:var(–t)}
.form-input,.form-select,.form-textarea{padding:12px 16px;border:1.5px solid var(–b);border-radius:8px;font-size:14px;font-family:inherit;transition:all .3s;background:#fff}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(–p);box-shadow:0 0 0 3px rgba(26,58,42,.08)}
.form-textarea{resize:vertical;min-height:110px}
footer{background:var(–p);color:rgba(255,255,255,.6);padding:56px 40px 28px}
.footer-inner{max-width:1400px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,.1)}
.footer-brand .logo-text{color:#fff;font-size:22px}
.footer-brand p{font-size:14px;line-height:1.7;margin-top:14px;color:rgba(255,255,255,.5)}
.footer-col h4{color:#fff;font-size:14px;font-weight:700;margin-bottom:16px}
.footer-col ul{list-style:none}
.footer-col li{margin-bottom:10px}
.footer-col a{color:rgba(255,255,255,.55);text-decoration:none;font-size:14px;transition:color .3s}
.footer-col a:hover{color:var(–a)}
.footer-bottom{padding-top:24px;text-align:center;font-size:13px}
@media(max-width:1024px){.hero-content{grid-template-columns:1fr;gap:40px;padding-top:90px}.hero h1{font-size:44px}.hero-card{display:none}.products-g{grid-template-columns:1fr}.features-g{grid-template-columns:1fr 1fr}.about-g{grid-template-columns:1fr}.certs-g{grid-template-columns:1fr 1fr}.contact-g{grid-template-columns:1fr}.footer-top{grid-template-columns:1fr 1fr}}
